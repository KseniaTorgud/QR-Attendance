{% extends "layout.html" %}
{% block content %}

<div class="card">
    <h2>Регистрация студента</h2>
    
    {% if error %}
    <div style="background: #ffebee; color: #c62828; padding: 10px; border-radius: 10px; margin-bottom: 20px;">
        {{ error }}
    </div>
    {% endif %}
    
    {% if success %}
    <div style="background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 10px; margin-bottom: 20px;">
        {{ success }}
    </div>
    {% endif %}
    
    <form method="POST" action="/student/register">
        <input type="text" name="username" placeholder="Имя пользователя (логин)" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <input type="text" name="first_name" placeholder="Имя" required>
        <input type="text" name="last_name" placeholder="Фамилия" required>
        <button type="submit">Зарегистрироваться</button>
    </form>
    
    <hr style="margin: 20px 0;">
    
    <p style="text-align: center;">Уже есть аккаунт?</p>
    <button onclick="location.href='/'" style="background: #8B9A7B;">Войти</button>
</div>

{% endblock %}
